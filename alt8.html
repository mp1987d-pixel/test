<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ArgentinaGo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #0b1d3a;
      color: #333;
    }

    /* --- HEADER --- */
    .main-header { background: #000; width: 100%; padding: 10px 0; }
    .header-container { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
    .logo-img { width: 180px; height: auto; }

    /* --- CARDS PRINCIPALES --- */
    .section { max-width: 1200px; margin: 40px auto; padding: 20px; background: #fff; border-radius: 20px; }
    .cards { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 10px; scrollbar-width: none; }
    .cards::-webkit-scrollbar { display: none; }
    .card { width: 280px; flex-shrink: 0; background: #f9f9f9; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
    .card img { width: 100%; height: 200px; object-fit: cover; }
    .card h3 { font-size: 18px; margin: 15px 0; }
    .card button { width: 100%; padding: 12px; border: none; background: #0077cc; color: #fff; font-weight: bold; cursor: pointer; }

    /* --- MODAL SYSTEM --- */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      inset: 0;
      background: #000;
    }

    .modal-scroll-container {
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory; /* El scroll se "pega" a las secciones */
      scrollbar-width: none;
    }
    .modal-scroll-container::-webkit-scrollbar { display: none; }

    /* SECCIÓN 1: IMAGEN (3/4) + TEXTO */
    .modal-section-content {
      min-height: 100vh;
      width: 100%;
      background: #fff;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
    }

    .carousel-wrapper {
      width: 100%;
      height: 75vh; /* 3/4 de la pantalla para la imagen */
      background: #000;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .carousel-item {
      position: absolute;
      inset: 0;
      opacity: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .carousel-item.active { opacity: 1; }
    .carousel-item img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .text-container {
      padding: 30px 25px;
      background: #fff;
      text-align: center;
    }
    .text-container h2 { font-size: 28px; margin: 0 0 15px 0; color: #111; }
    .text-container p { font-size: 17px; line-height: 1.6; color: #444; max-width: 800px; margin: 0 auto 30px; }

    .scroll-down-info {
      color: #0077cc;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 20px;
      display: block;
    }

    /* SECCIÓN 2: VIDEO FULL SCREEN */
    .modal-section-video {
      height: 100vh;
      width: 100%;
      background: #000;
      scroll-snap-align: start;
      position: relative;
    }
    .video-wrapper { position: absolute; inset: 0; }
    .video-wrapper iframe { width: 100%; height: 100%; border: none; }

    .close-modal-x {
      position: absolute; top: 20px; right: 20px; z-index: 2100;
      background: rgba(255,255,255,0.8); width: 45px; height: 45px;
      border-radius: 50%; text-align: center; line-height: 45px;
      font-size: 24px; cursor: pointer; color: #000;
    }

    .whatsapp-btn {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      z-index: 2100; background: #25D366; color: #fff; padding: 15px 30px;
      border-radius: 50px; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    @media (max-width: 600px) {
      .carousel-wrapper { height: 65vh; }
      .text-container h2 { font-size: 22px; }
    }
  </style>
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<header class="main-header">
  <div class="header-container">
    <img src="img/logo4.jpg" class="logo-img">
  </div>
</header>

<section class="section">
  <h2 id="section-title"></h2>
  <div class="cards" id="cards"></div>
</section>

<div id="modals"></div>

<script>
const isSpanish = (navigator.language || navigator.userLanguage).toLowerCase().startsWith("es");
const TEXTS = {
  es: { sectionTitle: "Destinos Destacados", seeMore: "Ver más", wap: "Reservar ahora", hint: "Desliza para ver video ↓" },
  en: { sectionTitle: "Featured Destinations", seeMore: "See more", wap: "Book Now", hint: "Scroll for video ↓" }
};
const lang = isSpanish ? "es" : "en";
document.getElementById("section-title").textContent = TEXTS[lang].sectionTitle;

const API_URL = "https://script.google.com/macros/s/AKfycbyBtRe25ZSD5jlv7eJ8ExlwDYHpKuA01RK8ToAMA3HuvMklOMDDRuU6wiBRKXkm0fhDOw/exec";
const IMG_BASE = "https://raw.githubusercontent.com/mp1987d-pixel/test/main/img/";

let players = {}; 
let carouselIntervals = {};
let touchStartX = 0;

fetch(API_URL).then(res => res.json()).then(data => {
    const cardsContainer = document.getElementById("cards");
    const modalsContainer = document.getElementById("modals");
    const filtered = data.filter(f => isSpanish ? f["Idioma"] === "Es" : f["Idioma"] === "En");

    filtered.forEach((fila, index) => {
      const modalId = `modal_${index}`;
      
      // Card
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <img src="${IMG_BASE + fila["Imagen"]}">
        <h3>${fila["Título"]}</h3>
        <button onclick="abrirModal('${modalId}', ${index})">${TEXTS[lang].seeMore}</button>
      `;
      cardsContainer.appendChild(card);

      // Fotos logic
      const cols = ["Imagen_modal", "Imagen3", "Imagen4", "Imagen5", "Imagen6"];
      let fotos = [];
      cols.forEach(c => { if(fila[c]) fotos.push(fila[c].trim()); });
      if(fotos.length === 0) fotos.push(fila["Imagen"]);

      const itemsHtml = fotos.map((f, i) => `
        <div class="carousel-item ${i===0?'active':''}">
          <img src="${IMG_BASE + f}">
        </div>
      `).join('');

      // Modal HTML
      const modal = document.createElement("div");
      modal.className = "modal";
      modal.id = modalId;
      modal.innerHTML = `
        <span class="close-modal-x" onclick="cerrarModal('${modalId}', ${index})">&times;</span>
        <div class="modal-scroll-container" id="scroll-${modalId}">
          
          <section class="modal-section-content">
            <div class="carousel-wrapper" 
                 ontouchstart="handleTouchStart(event)" 
                 ontouchend="handleTouchEnd(event, '${modalId}')"
                 onclick="nextSlide('${modalId}')">
              ${itemsHtml}
              <input type="hidden" class="idx" value="0">
              <input type="hidden" class="count" value="${fotos.length}">
            </div>
            <div class="text-container">
              <h2>${fila["Título"]}</h2>
              <p>${fila["Descripción_modal"] || fila["Descripción"]}</p>
              <span class="scroll-down-info">${TEXTS[lang].hint}</span>
            </div>
          </section>

          <section class="modal-section-video">
            <div class="video-wrapper"><div id="player-${index}"></div></div>
            <a href="https://wa.me/5491130162083" target="_blank" class="whatsapp-btn">
              <img src="img/WhatsApp.png" width="24" style="filter:brightness(0) invert(1)"> ${TEXTS[lang].wap}
            </a>
          </section>

        </div>
      `;
      modalsContainer.appendChild(modal);
      players[index] = { yt: fila["Youtube"], pl: fila["Youtube2"] ? `${fila["Youtube"]},${fila["Youtube2"]}` : fila["Youtube"], inst: null };
    });
});

/* CARRUSEL LOGIC */
function nextSlide(modalId, dir = 1) {
    const wrapper = document.querySelector(`#${modalId} .carousel-wrapper`);
    const items = wrapper.querySelectorAll('.carousel-item');
    const idxInput = wrapper.querySelector('.idx');
    const count = parseInt(wrapper.querySelector('.count').value);
    
    let current = parseInt(idxInput.value);
    items[current].classList.remove('active');
    current = (current + dir + count) % count;
    items[current].classList.add('active');
    idxInput.value = current;
}

function handleTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }
function handleTouchEnd(e, modalId) {
    let endX = e.changedTouches[0].screenX;
    if (Math.abs(touchStartX - endX) > 50) {
        nextSlide(modalId, touchStartX > endX ? 1 : -1);
        stopAutoplay(modalId);
        clearTimeout(window[`t_${modalId}`]);
        window[`t_${modalId}`] = setTimeout(() => startAutoplay(modalId), 30000);
    }
}

function startAutoplay(modalId) {
    stopAutoplay(modalId);
    carouselIntervals[modalId] = setInterval(() => nextSlide(modalId), 3500);
}
function stopAutoplay(modalId) { clearInterval(carouselIntervals[modalId]); }

/* MODAL NAV */
function abrirModal(id, idx) {
    document.getElementById(id).style.display = "block";
    document.body.style.overflow = "hidden";
    startAutoplay(id);
    initYT(idx);
}
function cerrarModal(id, idx) {
    document.getElementById(id).style.display = "none";
    document.body.style.overflow = "";
    stopAutoplay(id);
    if(players[idx].inst) players[idx].inst.pauseVideo();
    document.getElementById(`scroll-${id}`).scrollTop = 0;
}

function initYT(idx) {
    if (players[idx].inst) { players[idx].inst.playVideo(); return; }
    players[idx].inst = new YT.Player(`player-${idx}`, {
        height: '100%', width: '100%', videoId: players[idx].yt,
        playerVars: { autoplay: 1, mute: 1, loop: 1, playlist: players[idx].pl, playsinline: 1 }
    });
}
function onYouTubeIframeAPIReady() {}
</script>
</body>
</html>
