<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ArgentinaGo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b1d3a;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 30%),
        radial-gradient(circle at 70% 50%, rgba(255,255,255,0.06) 0%, transparent 30%),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.07) 0%, transparent 30%);
      background-size: 250px 250px, 300px 300px, 200px 200px;
      background-repeat: repeat;
      background-attachment: scroll;
      background-blend-mode: overlay;
    }

    /* --- HEADER --- */
    .main-header { background: #000; width: 100%; position: relative; overflow: hidden; }
    .header-container { width: 100%; display: flex; flex-direction: column; }
    .logo-img { width: 25%; height: auto; display: block; object-fit: cover; }
    .socials {
      position: absolute; top: 50%; right: 15px; transform: translateY(-50%);
      display: flex; gap: 12px; background: rgba(0, 0, 0, 0.55);
      padding: 8px 12px; border-radius: 30px; backdrop-filter: blur(6px); z-index: 20;
    }
    .socials img { width: 28px; height: 28px; transition: transform 0.2s ease; }
    .socials img:hover { transform: scale(1.15); }

    /* --- CARDS --- */
    .section { max-width: 1200px; margin: 40px auto; padding: 40px; background: rgba(255, 255, 255, 0.98); border-radius: 28px; position: relative; }
    .cards { display: flex; overflow-x: auto; gap: 25px; padding: 10px 5px; scrollbar-width: none; }
    .cards::-webkit-scrollbar { display: none; }
    .card { width: 300px; height: 450px; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; flex-shrink: 0; text-align: center; }
    .card img { width: 100%; height: 180px; object-fit: cover; }
    .card button { width: 100%; padding: 15px; border: none; background: #0077cc; color: #fff; cursor: pointer; font-weight: bold; }

    /* --- MODAL --- */
    .modal { display: none; position: fixed; z-index: 2000; inset: 0; background: #000; }
    .modal-scroll-container { 
      height: 100%; 
      overflow-y: scroll; 
      scroll-snap-type: y mandatory; 
      scrollbar-width: none; 
      scroll-behavior: smooth;
    }
    .modal-scroll-container::-webkit-scrollbar { display: none; }

    .modal-section { 
      height: 100vh; 
      width: 100%; 
      scroll-snap-align: start; 
      position: relative; 
      overflow: hidden; 
      display: flex;
      flex-direction: column;
    }

    /* Fondo negro de punta a punta para las fotos */
    .info-section { background: #fff; justify-content: flex-start; }
    
    .carousel-wrapper {
      width: 100%;
      height: 75vh;
      background: #000; /* Fondo negro punta a punta */
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: pan-y; /* Permite scroll vertical pero intercepta horizontal */
    }

    .carousel-item {
      position: absolute; inset: 0;
      opacity: 0; z-index: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .carousel-item.active { opacity: 1; z-index: 2; }
    .carousel-item img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .text-content { 
      padding: 10px 20px; 
      background: #fff; 
      flex-grow: 1; 
      text-align: center;
    }
    .text-content h2 { margin: 5px 0; font-size: 24px; color: #111; }
    .text-content p { color: #555; max-width: 700px; margin: 0 auto; line-height: 1.4; }

    /* Video Section */
    .video-section { background: #000; }
    .video-container { position: absolute; inset: 0; }
    .video-container iframe { width: 100%; height: 100%; border: none; }

    .close-modal-x {
      position: absolute; top: 20px; right: 20px; z-index: 120;
      background: rgba(255,255,255,0.7); color: #000;
      width: 40px; height: 40px; border-radius: 50%;
      text-align: center; line-height: 40px; font-size: 24px; cursor: pointer;
    }

    .whatsapp-float {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 100; background: #25D366; color: white; padding: 12px 25px;
      border-radius: 50px; text-decoration: none; font-weight: bold;
      display: flex; align-items: center; gap: 10px;
    }

    .scroll-hint-btn {
      margin-top: 10px; color: #0077cc; font-weight: bold; cursor: pointer;
      background: none; border: none; font-size: 14px;
    }

    @media (max-width: 600px) {
      .carousel-wrapper { height: 65vh; }
      .text-content h2 { font-size: 20px; }
    }
  </style>
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<header class="main-header">
  <div class="header-container">
    <img src="img/logo4.jpg" alt="ArgentinaGo" class="logo-img">
    <div class="socials">
      <a href="#"><img src="img/Facebook.png" alt=""></a>
      <a href="#"><img src="img/Instagra.png" alt=""></a>
    </div>
  </div>
</header>

<section class="section">
  <h2 id="section-title"></h2>
  <div class="cards" id="cards"></div>
</section>

<div id="modals"></div>

<script>
const isSpanish = (navigator.language || navigator.userLanguage).toLowerCase().startsWith("es");
const TEXTS = {
  es: { sectionTitle: "Destinos destacados", btnWap: "Reservar ahora", scrollHint: "Ver video ↓", seeMore: "Ver más" },
  en: { sectionTitle: "Featured destinations", btnWap: "Book Now", scrollHint: "Watch video ↓", seeMore: "See more" }
};
const lang = isSpanish ? "es" : "en";
document.getElementById("section-title").textContent = TEXTS[lang].sectionTitle;

const API_URL = "https://script.google.com/macros/s/AKfycbyBtRe25ZSD5jlv7eJ8ExlwDYHpKuA01RK8ToAMA3HuvMklOMDDRuU6wiBRKXkm0fhDOw/exec";
const IMG_BASE = "https://raw.githubusercontent.com/mp1987d-pixel/test/main/img/";

let players = {}; 
let carouselIntervals = {};
let touchStartX = 0;

fetch(API_URL).then(res => res.json()).then(data => {
    const cardsContainer = document.getElementById("cards");
    const modalsContainer = document.getElementById("modals");
    const filteredData = data.filter(fila => isSpanish ? fila["Idioma"] === "Es" : fila["Idioma"] === "En");

    filteredData.forEach((fila, index) => {
      const modalId = `modal_${index}`;
      
      // Card principal
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <img src="${IMG_BASE + fila["Imagen"]}">
        <h3>${fila["Título"]}</h3>
        <button onclick="abrirModal('${modalId}', ${index})">${TEXTS[lang].seeMore}</button>
      `;
      cardsContainer.appendChild(card);

      // Fotos del Carrusel
      const fotosCols = ["Imagen_modal", "Imagen3", "Imagen4", "Imagen5", "Imagen6"];
      let fotosArray = [];
      fotosCols.forEach(col => { if(fila[col]) fotosArray.push(fila[col].trim()); });
      if(fotosArray.length === 0) fotosArray.push(fila["Imagen"]);

      const carouselHtml = fotosArray.map((f, i) => `
        <div class="carousel-item ${i===0?'active':''}">
          <img src="${IMG_BASE + f}">
        </div>
      `).join('');

      // Modal Structure
      const modal = document.createElement("div");
      modal.className = "modal";
      modal.id = modalId;
      modal.innerHTML = `
        <span class="close-modal-x" onclick="cerrarModal('${modalId}', ${index})">&times;</span>
        <div class="modal-scroll-container" id="scroll-${modalId}">
          <section class="modal-section info-section">
            <div class="carousel-wrapper" 
                 ontouchstart="handleTouchStart(event)" 
                 ontouchend="handleTouchEnd(event, '${modalId}')"
                 onclick="nextSlide('${modalId}')">
              ${carouselHtml}
              <input type="hidden" class="slide-index" value="0">
              <input type="hidden" class="slide-count" value="${fotosArray.length}">
            </div>
            <div class="text-content">
              <h2>${fila["Título"]}</h2>
              <p>${fila["Descripción_modal"] || fila["Descripción"]}</p>
              <button class="scroll-hint-btn" onclick="scrollToVideo('${modalId}')">${TEXTS[lang].scrollHint}</button>
            </div>
          </section>
          <section class="modal-section video-section">
            <div class="video-container"><div id="player-${index}"></div></div>
            <a href="https://wa.me/5491130162083" target="_blank" class="whatsapp-float">
              <img src="img/WhatsApp.png" width="24" style="filter:invert(1)"> ${TEXTS[lang].btnWap}
            </a>
          </section>
        </div>
      `;
      modalsContainer.appendChild(modal);
      players[index] = { yt: fila["Youtube"], pl: fila["Youtube2"] ? `${fila["Youtube"]},${fila["Youtube2"]}` : fila["Youtube"], inst: null };
    });
});

/* LÓGICA DE CARRUSEL Y TOUCH */
function nextSlide(modalId, direction = 1) {
    const wrapper = document.querySelector(`#${modalId} .carousel-wrapper`);
    const items = wrapper.querySelectorAll('.carousel-item');
    const indexInput = wrapper.querySelector('.slide-index');
    const count = parseInt(wrapper.querySelector('.slide-count').value);
    
    let idx = parseInt(indexInput.value);
    items[idx].classList.remove('active');
    
    idx = (idx + direction + count) % count;
    
    items[idx].classList.add('active');
    indexInput.value = idx;
}

function handleTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }

function handleTouchEnd(e, modalId) {
    let touchEndX = e.changedTouches[0].screenX;
    if (Math.abs(touchStartX - touchEndX) > 50) {
        const dir = touchStartX > touchEndX ? 1 : -1;
        nextSlide(modalId, dir);
        
        // Pausar autoplay por 30 segundos en touch
        stopAutoplay(modalId);
        clearTimeout(window[`t_${modalId}`]);
        window[`t_${modalId}`] = setTimeout(() => startAutoplay(modalId), 30000);
    }
}

function startAutoplay(modalId) {
    stopAutoplay(modalId);
    carouselIntervals[modalId] = setInterval(() => nextSlide(modalId), 3500);
}

function stopAutoplay(modalId) {
    clearInterval(carouselIntervals[modalId]);
}

/* NAVEGACIÓN MODAL */
function abrirModal(id, idx) {
    document.getElementById(id).style.display = "block";
    document.body.style.overflow = "hidden";
    startAutoplay(id);
    initYT(idx);
}

function cerrarModal(id, idx) {
    document.getElementById(id).style.display = "none";
    document.body.style.overflow = "";
    stopAutoplay(id);
    if(players[idx].inst) players[idx].inst.pauseVideo();
    document.getElementById(`scroll-${id}`).scrollTop = 0;
}

function scrollToVideo(modalId) {
    document.getElementById(`scroll-${modalId}`).scrollTo({ top: window.innerHeight, behavior: 'smooth' });
}

function initYT(idx) {
    if (players[idx].inst) { players[idx].inst.playVideo(); return; }
    players[idx].inst = new YT.Player(`player-${idx}`, {
        height: '100%', width: '100%', videoId: players[idx].yt,
        playerVars: { autoplay: 1, mute: 1, loop: 1, playlist: players[idx].pl, playsinline: 1 }
    });
}

function onYouTubeIframeAPIReady() {}
</script>
</body>
</html>
