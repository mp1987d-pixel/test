<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ArgentinaGo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b1d3a;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 30%),
        radial-gradient(circle at 70% 50%, rgba(255,255,255,0.06) 0%, transparent 30%),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.07) 0%, transparent 30%);
      background-size: 250px 250px, 300px 300px, 200px 200px;
      background-repeat: repeat;
      background-attachment: scroll;
      background-blend-mode: overlay;
    }

    .main-header {
      background: #000000;
      padding: 0;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .header-container {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .logo-img {
      width: 25%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    .socials {
      position: absolute;
      top: 50%;
      right: 15px;
      transform: translateY(-50%);
      display: flex;
      gap: 12px;
      background: rgba(0, 0, 0, 0.55);
      padding: 8px 12px;
      border-radius: 30px;
      backdrop-filter: blur(6px);
      z-index: 20;
    }

    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .socials img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      transition: transform 0.2s ease;
    }

    .socials img:hover {
      transform: scale(1.15);
    }

    @media (max-width: 600px) {
      .socials {
        top: 50%;
        right: 10px;
        transform: translateY(-50%);
        padding: 6px 10px;
        gap: 10px;
      }
      .socials img {
        width: 26px;
        height: 26px;
      }
      .logo-img { width: 50%; }
    }

    .hero {
      width: 100%;
      height: 70vh;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: background-image 1s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url('img/vino.jpeg'); /* Imagen inicial */
    }

    .hero-content {
      background: rgba(0,0,0,0.45);
      padding: 30px 40px;
      border-radius: 10px;
      text-align: center;
      color: #fff;
    }

    .section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(255, 255, 255, 1);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.4), 0 10px 40px rgba(0, 0, 0, 0.04);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      position: relative;
    }

    .section h2 {
      color: #1d1d1f;
      text-align: center;
      margin-bottom: 40px;
    }

    .carousel-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .cards {
      display: flex;
      overflow-x: auto;
      scroll-behavior: smooth;
      gap: 25px;
      padding: 10px 5px;
      scrollbar-width: none;
    }

    .cards::-webkit-scrollbar { display: none; }

    .card {
      width: 300px;
      height: 450px;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card button {
      margin: 15px 0 20px;
      padding: 10px 20px;
      border: none;
      background: #0077cc;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      inset: 0;
      background: rgba(0,0,0,0.8);
      overflow-y: auto;
    }

    .modal-content {
      background: #fff;
      margin: 40px auto;
      padding: 20px;
      border-radius: 12px;
      max-width: 800px;
      width: 90%;
      text-align: center;
    }

    .modal-content img {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 8px;
    }

    .close {
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }

    .whatsapp-btn {
      display: inline-block;
      padding: 12px 25px;
      background: #25D366;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 15px;
    }

    .main-footer {
      background: #111;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    .footer-links a {
      color: #fff;
      text-decoration: none;
      cursor: pointer;
    }

    /* Modal términos */
    #termsModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    #termsContent {
      background: #000;
      color: #fff;
      padding: 40px;
      max-width: 600px;
      width: 90%;
      border-radius: 10px;
      text-align: center;
      position: relative;
    }

    .close-terms {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header class="main-header">
  <div class="header-container">
    <a href="/" class="logo-link">
      <img src="img/logo4.jpg" alt="ArgentinaGo" class="logo-img">
    </a>
    <div class="socials">
      <a href="#"><img src="img/Facebook.png" alt="Facebook"></a>
      <a href="#"><img src="img/Instagra.png" alt="Instagram"></a>
      <a href="#"><img src="img/YouTube.png" alt="YouTube"></a>
      <a href="#"><img src="img/TikTok.png" alt="TikTok"></a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1 id="hero-title"></h1>
    <p id="hero-subtitle"></p>
  </div>
</section>

<section class="section">
  <h2 id="section-title"></h2>
  <div class="carousel-container">
    <button class="nav-btn prev-btn" onclick="moveCarousel(-1)">&#10094;</button>
    <div class="cards" id="cards"></div>
    <button class="nav-btn next-btn" onclick="moveCarousel(1)">&#10095;</button>
  </div>
</section>

<div id="modals"></div>

<div id="termsModal">
  <div id="termsContent">
    <span class="close-terms">&times;</span>
    <p id="termsText"></p>
  </div>
</div>

<footer class="main-footer">
  <div class="footer-links">
    <a id="terms-link" href="javascript:void(0)"></a> |
    <span>virvik@gmail.com</span> |
    <span>+5491130162083</span>
  </div>
</footer>

<script>
/* ================= DETECCION IDIOMA ================= */
const browserLang = navigator.language || navigator.userLanguage;
const isSpanish = browserLang.toLowerCase().startsWith("es");
document.documentElement.lang = isSpanish ? "es" : "en";

const TEXTS = {
  es: {
    heroTitle: "Descubrí Argentina",
    heroSubtitle: "Experiencias únicas pensadas para nuestros huéspedes",
    sectionTitle: "Destinos destacados",
    terms: "Términos y condiciones",
    termsText: "Contenido de los términos y condiciones de prueba."
  },
  en: {
    heroTitle: "Discover Argentina",
    heroSubtitle: "Unique experiences thought for our visitors",
    sectionTitle: "Featured destinations",
    terms: "Terms and conditions",
    termsText: "Test terms and conditions content."
  }
};

const langKey = isSpanish ? "es" : "en";

// Rellenar textos iniciales
document.getElementById("hero-title").textContent = TEXTS[langKey].heroTitle;
document.getElementById("hero-subtitle").textContent = TEXTS[langKey].heroSubtitle;
document.getElementById("section-title").textContent = TEXTS[langKey].sectionTitle;
document.getElementById("terms-link").textContent = TEXTS[langKey].terms;
document.getElementById("termsText").textContent = TEXTS[langKey].termsText;

/* ================= FUNCION NAVEGACIÓN CARRUSEL ================= */
function moveCarousel(direction) {
  const container = document.getElementById("cards");
  const scrollAmount = container.clientWidth * 0.8;
  container.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
}

/* ================= HERO CARRUSEL ================= */
const heroImages = ["img/vino.jpeg", "img/prueba2.jpeg", "img/carru4.jpeg"];
let heroIndex = 0;
const heroSection = document.querySelector(".hero");

setInterval(() => {
  heroIndex = (heroIndex + 1) % heroImages.length;
  heroSection.style.backgroundImage = `url('${heroImages[heroIndex]}')`;
}, 4000);

/* ================= CARGA DE DATOS API ================= */
const API_URL = "https://script.google.com/macros/s/AKfycbyBtRe25ZSD5jlv7eJ8ExlwDYHpKuA01RK8ToAMA3HuvMklOMDDRuU6wiBRKXkm0fhDOw/exec";
const IMG_BASE = "https://raw.githubusercontent.com/mp1987d-pixel/test/main/img/";
const YT_BASE = "https://www.youtube.com/embed/";

fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    const cardsContainer = document.getElementById("cards");
    const modalsContainer = document.getElementById("modals");

    const filteredData = data.filter(fila => {
      return isSpanish ? fila["Idioma"] === "Es" : fila["Idioma"] === "En";
    });

    filteredData.forEach((fila, index) => {
      if (!fila["Título"] || !fila["Imagen"]) return;

      const modalId = `modal_${index}`;
      const imgSrc = IMG_BASE + fila["Imagen"];
      const img2Src = IMG_BASE + (fila["Imagen_modal"] || fila["Imagen"]);
      const youtubeSrc = fila["Youtube"] ? YT_BASE + fila["Youtube"] : "";

      // Crear Card
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <img src="${imgSrc}" alt="${fila["Título"]}">
        <h3>${fila["Título"]}</h3>
        <p>${fila["Descripción"] || ""}</p>
        <button class="open-modal" data-modal="${modalId}">
          ${isSpanish ? "Ver más" : "See more"}
        </button>
      `;
      cardsContainer.appendChild(card);

      // Crear Modal
      const modal = document.createElement("div");
      modal.className = "modal";
      modal.id = modalId;
      modal.innerHTML = `
        <div class="modal-content">
          <span class="close">&times;</span>
          <h2>${fila["Título"]}</h2>
          <img src="${img2Src}" alt="${fila["Título"]}">
          <p>${fila["Descripción_modal"] || ""}</p>
          ${youtubeSrc ? `<iframe src="${youtubeSrc}" width="100%" height="315" frameborder="0" allowfullscreen></iframe>` : ""}
          <a href="https://wa.me/5491112345678" target="_blank" class="whatsapp-btn">
            ${isSpanish ? "Contactar por WhatsApp" : "Contact via WhatsApp"}
          </a>
        </div>
      `;
      modalsContainer.appendChild(modal);
    });

    activarModales();
  })
  .catch(err => console.error("Error cargando API:", err));

function activarModales() {
  document.querySelectorAll(".open-modal").forEach(btn => {
    btn.onclick = () => {
      document.getElementById(btn.dataset.modal).style.display = "block";
      document.body.style.overflow = "hidden";
    };
  });

  document.querySelectorAll(".close").forEach(btn => {
    btn.onclick = () => {
      btn.closest(".modal").style.display = "none";
      document.body.style.overflow = "";
    };
  });
}

/* ================= MODAL TÉRMINOS ================= */
const termsModal = document.getElementById("termsModal");
const termsLink = document.getElementById("terms-link");
const closeTerms = document.querySelector(".close-terms");

termsLink.onclick = (e) => {
  e.preventDefault();
  termsModal.style.display = "flex";
  document.body.style.overflow = "hidden";
};

closeTerms.onclick = () => {
  termsModal.style.display = "none";
  document.body.style.overflow = "";
};

window.addEventListener("click", (e) => {
  if (e.target === termsModal) {
    termsModal.style.display = "none";
    document.body.style.overflow = "";
  }
  // Cerrar modales de destinos si se hace clic fuera
  if (e.target.classList.contains('modal')) {
    e.target.style.display = "none";
    document.body.style.overflow = "";
  }
});
</script>

</body>
</html>
